# Windows distributables: portable .exe + NSIS installer.
# Output: release/

appId: dev.openclaw.desktop
# Display / PE metadata (File description, shortcuts). No spaces; icon: control-ui/public/favicon.ico.
productName: OpenClaw
# Stable .exe basename (rcedit + task manager / Firewall labels).
executableName: OpenClaw
directories:
  output: release

publish:
  provider: github
  owner: Mankhb2k
  repo: openclaw-1click

# NSIS yêu cầu .ico có ít nhất 256×256 (control-ui/public/favicon.ico đã có).
icon: control-ui/public/favicon.ico

files:
  - dist/**/*
  - package.json
  - node_modules/**/*

extraResources:
  - from: resources
    to: resources
    filter:
      - "**/*"

asar: true
# Windows: icon trong .asar không load được cho taskbar → phải unpack ra đĩa (xem app-icon.ts).
asarUnpack:
  - "dist/main/assets/*.ico"
  - "dist/main/assets/*.png"
  # Control UI from dist/control-ui is set as gateway.controlUi.root → kind "resolved" + rejectHardlinks.
  # Files inside .asar often report nlink>1; safe-open rejects them → 404 on /assets/*.js. Unpack to real disk.
  - "dist/control-ui/**"
  - "vendor/control-ui/**"

# Avoid winCodeSign extraction (symlinks) on machines without Developer Mode / admin.
win:
  icon: control-ui/public/favicon.ico
  # Cách A: để electron-builder tự patch icon/metadata vào file exe.
  # (Mặc định true; đang bật vì bạn thấy exe vẫn mang icon mặc định của Electron.)
  signAndEditExecutable: true
  # Shown where Windows expects a publisher label (full effect with code signing + matching cert subject).
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64

# Hyphenated artifacts avoid spaces; unique pattern reduces AV/process lock issues during rebuild.
portable:
  artifactName: "${productName}-Portable-${version}.${ext}"

nsis:
  installerIcon: control-ui/public/favicon.ico
  uninstallerIcon: control-ui/public/favicon.ico
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: OpenClaw
  uninstallDisplayName: OpenClaw
  # Output: release/OpenClaw-Setup-x.x.x.exe
  artifactName: "${productName}-1Click-Setup-${version}.${ext}"
